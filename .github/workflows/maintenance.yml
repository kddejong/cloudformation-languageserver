name: Weekly Maintenance

on:
  schedule:
    - cron: '0 10 * * 1'  # Weekly on Mondays at 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  get-configs:
    uses: ./.github/workflows/configs.yml

  maintenance:
    needs: [get-configs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ needs.get-configs.outputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.get-configs.outputs.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          cd /tmp/git-secrets
          sudo make install

      - name: Run Maintenance Tasks
        run: npm run download-wheels

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: daily maintenance update'
          branch: maintenance/daily-update
          delete-branch: true
          title: 'chore: Weekly Maintenance Update'
          body: |
            Automated maintenance update
            
            - Updated wheels via download-wheels
            
            This PR was automatically created by the weekly maintenance workflow.
          labels: maintenance, automated
